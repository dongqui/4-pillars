<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;}
  ::selection{background:#E0E1FB;}
  a{color:#4F46E5;text-decoration:none;}
  a:hover{color:#4338CA;}
</style>
</helmet>

<div style="min-height:100vh; background:#fff; font-family:'Pretendard','Pretendard Variable',-apple-system,system-ui,sans-serif; color:#111827; -webkit-font-smoothing:antialiased; line-height:1.5; display:flex; flex-direction:column;">

  <!-- top bar -->
  <header style="padding:20px clamp(20px,5vw,32px); display:flex; align-items:center; justify-content:space-between;">
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:30px; height:30px; border-radius:10px; background:#111827; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:600; font-size:15px;">사</div>
      <span style="font-weight:600; font-size:16px; letter-spacing:-0.02em;">사주</span>
    </div>
    <a href="#" style="font-size:14px; font-weight:500; color:#9CA3AF;" style-hover="color:#4B5563;">← 돌아가기</a>
  </header>

  <!-- center card -->
  <main style="flex:1; display:flex; align-items:center; justify-content:center; padding:24px clamp(20px,5vw,32px) 80px;">
    <div style="width:100%; max-width:380px; text-align:center;">

      <h1 style="font-size:clamp(24px,5vw,28px); font-weight:700; letter-spacing:-0.03em; line-height:1.3; margin:0 0 10px; word-break:keep-all;">사주에 오신 걸 환영해요</h1>
      <p style="font-size:15px; color:#9CA3AF; margin:0 0 36px; word-break:keep-all;">간편 로그인으로 3초 만에 시작하세요.<br>처음이라면 자동으로 가입돼요.</p>

      <div style="display:flex; flex-direction:column; gap:10px;">

        <!-- Kakao -->
        <button style="position:relative; font-family:inherit; height:52px; border:none; border-radius:14px; background:#FEE500; color:rgba(0,0,0,.85); font-size:15px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center;" style-hover="filter:brightness(.97);">
          <span style="position:absolute; left:18px; display:flex;"><svg width="20" height="20" viewBox="0 0 24 24"><path fill="#191919" d="M12 3C6.48 3 2 6.54 2 10.9c0 2.8 1.86 5.26 4.66 6.65l-.95 3.5c-.08.31.27.56.54.38l4.18-2.77c.51.05 1.03.08 1.57.08 5.52 0 10-3.54 10-7.9S17.52 3 12 3z"/></svg></span>
          카카오로 계속하기
          <sc-if value="{{ showLastLogin }}" hint-placeholder-val="{{ true }}">
          <span style="position:absolute; right:14px; font-size:11px; font-weight:700; color:#fff; background:rgba(0,0,0,.72); padding:4px 9px; border-radius:999px;">최근 로그인</span>
          </sc-if>
        </button>

        <!-- LINE -->
        <button style="position:relative; font-family:inherit; height:52px; border:none; border-radius:14px; background:#06C755; color:#fff; font-size:15px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center;" style-hover="filter:brightness(.96);">
          <span style="position:absolute; left:18px; display:flex;"><svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M12 3C6.48 3 2 6.54 2 10.9c0 2.8 1.86 5.26 4.66 6.65l-.95 3.5c-.08.31.27.56.54.38l4.18-2.77c.51.05 1.03.08 1.57.08 5.52 0 10-3.54 10-7.9S17.52 3 12 3z"/><path fill="#06C755" d="M8.2 9.4h1v3.6h-1zM10 9.4h.9l1.6 2.2V9.4h1v3.6h-.9l-1.6-2.2v2.2h-1zM7.5 12.1v.9H5.3V9.4h1v2.7zM17.9 9.4v.9h-1.5v.5h1.5v.9h-1.5v.5h1.5v.8h-2.5V9.4z"/></svg></span>
          LINE으로 계속하기
        </button>

        <!-- Google -->
        <button style="position:relative; font-family:inherit; height:52px; border:1px solid #E5E7EB; border-radius:14px; background:#fff; color:#374151; font-size:15px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center;" style-hover="background:#F9FAFB;">
          <span style="position:absolute; left:18px; display:flex;"><svg width="19" height="19" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg></span>
          Google로 계속하기
        </button>

        <!-- Apple -->
        <button style="position:relative; font-family:inherit; height:52px; border:none; border-radius:14px; background:#111827; color:#fff; font-size:15px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center;" style-hover="background:#1F2937;">
          <span style="position:absolute; left:18px; display:flex;"><svg width="19" height="19" viewBox="0 0 24 24"><path fill="#fff" d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8.98-.2 1.92-.9 3.16-.81 1.79.14 3.02.86 3.71 2.17-3.35 2.01-2.81 6.42.5 7.73-.65 1.63-1.5 3.06-2.45 4.08zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg></span>
          Apple로 계속하기
        </button>

      </div>

      <p style="font-size:12.5px; color:#9CA3AF; line-height:1.7; margin:28px 0 0; word-break:keep-all;">계속하면 사주의 <a href="#" style="color:#6B7280; text-decoration:underline;">이용약관</a> 및 <a href="#" style="color:#6B7280; text-decoration:underline;">개인정보 처리방침</a>에 동의하는 것으로 간주됩니다.</p>
      <p style="font-size:12.5px; color:#C7CBD1; margin:10px 0 0; display:flex; align-items:center; justify-content:center; gap:6px;">🔒 입력하신 출생 정보는 안전하게 보관돼요</p>

    </div>
  </main>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 760 },
  &quot;showLastLogin&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    return { showLastLogin: this.props.showLastLogin ?? true };
  }
}
</script>
</body>
</html>
